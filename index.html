<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول عصري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        /* جعل العناصر في منتصف الصفحة تماماً */
        body {
            height: 100vh;
            display: flex;
            justify-content: center; /* توسيط أفقي */
            align-items: center;     /* توسيط رأسي */
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: white;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #fff;
        }

        p {
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: right;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 40px;
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            padding-right: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 45px 14px 15px; /* مسافة للأيقونة */
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #6c5ce7;
            background: rgba(255, 255, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #6c5ce7;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
        }

        .login-btn:hover {
            background: #a29bfe;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
            transform: translateY(-3px);
        }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            opacity: 0.4;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: white;
            margin: 0 10px;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: transparent;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .google-btn i {
            color: #ea4335;
            font-size: 1.2rem;
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: #a29bfe;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>تسجيل الدخول</h2>
        <p>مرحباً بك مجدداً في منصتنا</p>

        <form>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="example@mail.com" required>
            </div>
            
            <div class="input-group">
                <label>كلمة المرور</label>
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">دخول</button>

            <div class="divider">أو</div>

            <button type="button" class="google-btn">
                <i class="fab fa-google"></i>
                الدخول بواسطة جوجل
            </button>

            <div class="footer-links">
                ليس لديك حساب؟ <a href="#">سجل الآن</a>
            </div>
        </form>
    </div>

</body>
</html>
