<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة الذكية | دخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap');

        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            overflow: hidden;
        }

        /* حاوية التصميم */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { text-align: center; margin-bottom: 30px; }
        
        .header .icon-box {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .header h1 { color: #fff; font-size: 1.8rem; font-weight: 900; }
        .header p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 5px; }

        /* تنسيق المدخلات بدقة */
        .field { margin-bottom: 20px; position: relative; }
        
        .field label {
            display: block;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .field input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .field input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .field i {
            position: absolute;
            right: 15px;
            top: 42px;
            color: var(--primary);
            font-size: 1rem;
        }

        /* الأزرار */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to left, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        .separator {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
        }
        .separator::before, .separator::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

        .google-auth {
            width: 100%;
            padding: 12px;
            background: #fff;
            border-radius: 12px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            cursor: pointer;
            color: #1f2937;
            transition: 0.3s;
        }

        .google-auth:hover { background: #f3f4f6; }

        .footer { text-align: center; margin-top: 25px; font-size: 0.85rem; }
        .footer a { color: var(--secondary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="glass-card">
            <div class="header">
                <div class="icon-box"><i class="fas fa-shield-halved fa-lg" style="color: white;"></i></div>
                <h1>تسجيل الدخول</h1>
                <p>مرحباً بك في نظامك المتطور</p>
            </div>

            <form id="loginForm">
                <div class="field">
                    <label>البريد الإلكتروني</label>
                    <i class="fas fa-at"></i>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>

                <div class="field">
                    <label>كلمة المرور</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">دخول للمنصة</button>

                <div class="separator">أو من خلال</div>

                <button type="button" class="google-auth">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                    متابعة باستخدام Google
                </button>
            </form>

            <div class="footer">
                <p>ليس لديك حساب؟ <a href="#">أنشئ حسابك الآن</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        // هنا نقوم بربط الـ Frontend بقاعدة البيانات
        // ملاحظة: ستحتاج لوضع مفاتيح Firebase الخاصة بك هنا ليعمل الربط فعلياً
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // التعامل مع نموذج الدخول
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            console.log("جاري محاولة الدخول لـ:", email);
            // هنا يتم استدعاء قاعدة البيانات للتحقق
            alert("تم إرسال البيانات لقاعدة البيانات بنجاح! (تأكد من وضع إعدادات Firebase لتعمل فعلياً)");
        });
    </script>
</body>
</html>
